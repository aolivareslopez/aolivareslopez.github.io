<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alex — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100vh;
    background: #0d0a07;
    font-family: 'EB Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  #root {
    width: 100%; min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  canvas#bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .ui {
    position: relative; z-index: 3;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 2.5rem;
    width: 100%;
  }

  .tabs {
    display: flex; gap: 5px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 1rem;
  }

  .tb {
    font-family: 'EB Garamond', serif; font-size: 12px;
    letter-spacing: 0.07em; color: #b89050;
    background: rgba(30,20,8,0.72);
    border: 0.5px solid rgba(184,144,80,0.35);
    border-radius: 1px; padding: 4px 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .tb:hover, .tb.on {
    background: rgba(184,144,80,0.18);
    color: #f0d8a0;
    border-color: rgba(184,144,80,0.65);
  }

  .stand { display: flex; flex-direction: column; align-items: center; }

  .sheet-frame { width: 320px; position: relative; }

  .sheet {
    width: 320px; min-height: 420px;
    background: #f8f2e2;
    border-radius: 1px;
    padding: 1.4rem 1.7rem 1.7rem;
    position: relative; display: none;
    box-shadow: 0 12px 50px rgba(0,0,0,0.75), 0 2px 8px rgba(0,0,0,0.5);
  }
  .sheet.on { display: block; }
  .sheet.fout { animation: fout 0.18s ease-in forwards; }
  .sheet.fin  { animation: fin  0.22s ease-out forwards; }

  @keyframes fout {
    from { transform: perspective(900px) rotateY(0) scale(1); opacity: 1; }
    to   { transform: perspective(900px) rotateY(-22deg) scale(0.97); opacity: 0; }
  }
  @keyframes fin {
    from { transform: perspective(900px) rotateY(22deg) scale(0.97); opacity: 0; }
    to   { transform: perspective(900px) rotateY(0) scale(1); opacity: 1; }
  }

  .sheet::before {
    content: ''; position: absolute; inset: 0; border-radius: 1px; pointer-events: none;
    background: repeating-linear-gradient(transparent, transparent 25px, rgba(80,55,20,0.12) 25px, rgba(80,55,20,0.12) 26px);
    background-position: 0 48px;
  }
  .sheet::after {
    content: ''; position: absolute; top: 0; right: 0;
    width: 22px; height: 22px;
    background: linear-gradient(225deg, #c8a050 50%, #f8f2e2 50%);
    border-radius: 0 1px 0 0;
  }

  .pn { position: absolute; bottom: 10px; right: 14px; font-size: 10px; color: #8c6230; letter-spacing: 0.05em; font-family: 'EB Garamond', serif; }

  .tempo { font-style: italic; font-size: 10.5px; color: #7a5820; margin-bottom: 3px; letter-spacing: 0.02em; }
  .stitle { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: #1a1005; text-align: center; border-bottom: 1px solid rgba(90,60,20,0.18); padding-bottom: 7px; margin-bottom: 11px; letter-spacing: 0.04em; }

  .lbl { font-family: 'Playfair Display', serif; font-size: 9px; font-weight: 600; color: #8c6230; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; margin-top: 9px; }
  .lbl:first-child { margin-top: 0; }

  .txt { font-size: 12.5px; color: #231608; line-height: 1.5; }
  .txt em { color: #5c3a10; }

  .div { height: 1px; background: rgba(90,60,20,0.13); margin: 7px 0; }

  .tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
  .tag { font-size: 10.5px; color: #5c3a10; border: 0.5px solid #c8a050; border-radius: 1px; padding: 1px 7px; background: rgba(200,160,80,0.09); }

  .pt { font-family: 'Playfair Display', serif; font-size: 12px; font-weight: 600; color: #1a1005; }
  .pd { font-size: 11.5px; color: #3a2510; line-height: 1.42; }

  .cr { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #1a1005; margin-bottom: 5px; }
  .ci { font-size: 13px; color: #8c6230; width: 15px; text-align: center; }

  .nav {
    display: flex; align-items: center; justify-content: space-between;
    width: 320px; margin-top: 8px;
  }

  .nb {
    font-family: 'EB Garamond', serif; font-size: 12px; color: #b89050;
    background: rgba(20,14,4,0.65);
    border: 0.5px solid rgba(184,144,80,0.32);
    border-radius: 1px; padding: 4px 16px;
    cursor: pointer; letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .nb:hover { background: rgba(184,144,80,0.18); color: #f0d8a0; }
  .nb:disabled { opacity: 0.22; cursor: default; }

  .pi { font-family: 'EB Garamond', serif; font-size: 11px; color: #8c6230; letter-spacing: 0.08em; }

  svg.stand-svg { overflow: visible; display: block; }

  @media (max-width: 400px) {
    .sheet-frame, .sheet { width: 280px; }
    .nav { width: 280px; }
    svg.stand-svg { width: 300px; }
  }
</style>
</head>
<body>
<div id="root">
  <canvas id="bg"></canvas>
  <div class="ui">
    <div class="tabs" id="tabs"></div>
    <div class="stand">
      <div class="sheet-frame" id="sf"></div>
      <div class="nav">
        <button class="nb" id="pb" onclick="go(-1)">◂ Prev</button>
        <span class="pi" id="pi"></span>
        <button class="nb" id="nb2" onclick="go(1)">Next ▸</button>
      </div>

      <svg class="stand-svg" width="360" height="200" viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ledgeG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5a4520"/>
            <stop offset="40%" stop-color="#3d2e12"/>
            <stop offset="100%" stop-color="#1e1608"/>
          </linearGradient>
          <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0e0a04"/>
            <stop offset="30%" stop-color="#3d2e12"/>
            <stop offset="70%" stop-color="#2a1f0a"/>
            <stop offset="100%" stop-color="#0e0a04"/>
          </linearGradient>
          <linearGradient id="footG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0e0a04"/>
            <stop offset="50%" stop-color="#3d2e12"/>
            <stop offset="100%" stop-color="#0e0a04"/>
          </linearGradient>
          <filter id="sh">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.65"/>
          </filter>
        </defs>
        <rect x="118" y="0" width="124" height="15" rx="3" fill="url(#ledgeG)" filter="url(#sh)"/>
        <rect x="126" y="13" width="108" height="5" rx="1" fill="#0e0a04"/>
        <rect x="174" y="16" width="12" height="82" fill="url(#neckG)"/>
        <rect x="174" y="98" width="12" height="52" fill="url(#neckG)"/>
        <rect x="92" y="132" width="54" height="11" rx="4" fill="url(#footG)" filter="url(#sh)" transform="rotate(-17,119,137)"/>
        <rect x="214" y="132" width="54" height="11" rx="4" fill="url(#footG)" filter="url(#sh)" transform="rotate(17,241,137)"/>
        <ellipse cx="180" cy="168" rx="75" ry="6" fill="#000" opacity="0.32"/>
      </svg>
    </div>
  </div>
</div>

<script>
const pages = [
  {
    tempo: 'Andante con moto', title: 'About Me',
    html: `
      <div class="lbl">Name</div><div class="txt">Alex</div>
      <div class="div"></div>
      <div class="lbl">Currently</div><div class="txt">CS student at <em>UC Irvine</em> · Resident Advisor · Aspiring software engineer</div>
      <div class="div"></div>
      <div class="lbl">Based in</div><div class="txt">Coachella Valley, California</div>
      <div class="div"></div>
      <div class="lbl">Interests</div><div class="txt">Real estate · Software engineering · AI/ML · Community building</div>
      <div class="div"></div>
      <div class="lbl">Seeking</div><div class="txt">Software engineering internships & part-time tech roles</div>
    `
  },
  {
    tempo: 'Vivace', title: 'Skills',
    html: `
      <div class="lbl">Languages</div>
      <div class="tags"><span class="tag">Python</span><span class="tag">JavaScript</span><span class="tag">TypeScript</span><span class="tag">Java</span><span class="tag">SQL</span><span class="tag">C/C++</span></div>
      <div class="div"></div>
      <div class="lbl">Frameworks</div>
      <div class="tags"><span class="tag">React 18</span><span class="tag">Node.js</span><span class="tag">Cornerstone.js</span><span class="tag">Pyro</span><span class="tag">PyTorch</span></div>
      <div class="div"></div>

      <div class="tags"><span class="tag">MySQL</span><span class="tag">PostgreSQL</span><span class="tag">B+ Trees</span><span class="tag">Ext. Hashing</span></div>
      <div class="div"></div>
      <div class="lbl">Tools</div>
      <div class="tags"><span class="tag">Git</span><span class="tag">GitHub</span><span class="tag">VS Code</span><span class="tag">Figma</span><span class="tag">macOS</span></div>
      <div class="div"></div>
      <div class="lbl">Concepts</div>
      <div class="tags"><span class="tag">Algorithms & DS</span><span class="tag">Machine Learning</span><span class="tag">Relational Algebra</span></div>
    `
  },
  {
    tempo: 'Allegro moderato', title: 'Projects',
    html: `
      <div class="pt">DICOM Dental Imaging Viewer</div>
      <div class="pd">Browser-native X-ray viewer in <em>React 18 + TypeScript</em> with Cornerstone.js. Capstone for INF 117.</div>
      <div class="div"></div>
      <div class="pt">ZotEvent Database Platform</div>
      <div class="pd">MySQL + Python campus event app with complex JOIN queries — CS 122A.</div>
      <div class="div"></div>
      <div class="pt">Blackjack Policy Optimizer</div>
      <div class="pd">Policy gradient optimizer in <em>Pyro</em> for optimal Blackjack strategy — CS 179.</div>
      <div class="div"></div>
      <div class="pt">STR Investment Model</div>
      <div class="pd">Real estate analysis for Coachella Valley leveraging festival-season demand patterns.</div>
    `
  },
  {
    tempo: 'Maestoso', title: 'Experience',
    html: `
      <div class="lbl">Resident Advisor · UC Irvine</div>
      <div class="txt" style="font-size:10px;color:#7a5820;margin-bottom:2px;">Arroyo Vista — Current</div>
      <div class="txt">Mentored a student residential community while balancing rigorous CS coursework and on-call duties.</div>
      <div class="div"></div>
      <div class="lbl">Real Estate Investor · Coachella Valley</div>

      <div class="txt">STR strategy targeting Coachella & Stagecoach festival seasons for long-term wealth building.</div>
      <div class="div"></div>
      <div class="lbl">Apple Store Candidate · Specialist</div>
      <div class="txt" style="font-size:10px;color:#7a5820;margin-bottom:2px;">Coachella Valley — In Progress</div>
      <div class="txt">Progressing through Apple's multi-stage hiring process post online assessment.</div>

  },
  {
    tempo: 'Grave e sostenuto', title: 'Education',
    html: `
      <div class="lbl">UC Irvine — B.S. Computer Science</div>
      <div class="txt" style="font-size:10px;color:#7a5820;margin-bottom:3px;">2021 – Present</div>
      <div class="txt">Surpassed graduation unit requirement; extending enrollment strategically for recruiting cycles.</div>
      <div class="div"></div>
      <div class="lbl">Coursework</div>
      <div class="tags">
        <span class="tag">Database Systems</span><span class="tag">Software Eng.</span>
        <span class="tag">Machine Learning</span><span class="tag">Probabilistic Models</span>
        <span class="tag">Algorithms & DS</span><span class="tag">Computer Architecture</span>
      </div>
      <div class="div"></div>
      <div class="lbl">Highlights</div>
      <div class="txt">Dental imaging capstone · ~92% in DB Systems · Strong indexing & query optimization background</div>
    `
  },
  {
    tempo: 'Dolce', title: 'Contact',
    html: `
      <div class="txt" style="font-style:italic;color:#5c3a10;margin-bottom:10px;font-size:12px;">Open to internships, part-time tech roles, and real estate conversations.</div>
      <div class="cr"><i class="ti ti-mail ci" aria-hidden="true"></i> your.email@example.com</div>
      <div class="cr"><i class="ti ti-brand-linkedin ci" aria-hidden="true"></i> linkedin.com/in/yourhandle</div>
      <div class="cr"><i class="ti ti-brand-github ci" aria-hidden="true"></i> github.com/yourhandle</div>
      <div class="cr"><i class="ti ti-map-pin ci" aria-hidden="true"></i> Coachella, California</div>
      <div class="div"></div>
      <div class="lbl">Resume</div><div class="txt">Available upon request</div>
      <div class="div"></div>
      <div class="lbl">Response time</div><div class="txt">Within 24–48 hours</div>
    `
  }
];

let cur = 0, busy = false;

function mkSheet(p, n) {
  return `<div class="sheet on" id="sh">
    <div class="tempo">${p.tempo}</div>
    <div class="stitle">${p.title}</div>
    ${p.html}
    <div class="pn">${n} / ${pages.length}</div>
  </div>`;
}

function mkTabs() {
  document.getElementById('tabs').innerHTML = pages.map((p, i) =>
    `<button class="tb${i === cur ? ' on' : ''}" onclick="goTo(${i})">${p.title}</button>`
  ).join('');
}

function upNav() {
  document.getElementById('pb').disabled = cur === 0;
  document.getElementById('nb2').disabled = cur === pages.length - 1;
  document.getElementById('pi').textContent = `${cur + 1} of ${pages.length}`;
  mkTabs();
}

function goTo(idx) {
  if (busy || idx === cur || idx < 0 || idx >= pages.length) return;
  busy = true;
  const sf = document.getElementById('sf');
  const old = sf.querySelector('.sheet');
  if (old) {
    old.classList.add('fout');
    setTimeout(() => {
      cur = idx;
      sf.innerHTML = mkSheet(pages[cur], cur + 1);
      const nw = sf.querySelector('.sheet');
      nw.classList.add('fin');
      upNav();
      setTimeout(() => { nw.classList.remove('fin'); busy = false; }, 240);
    }, 170);
  }
}

function go(d) { goTo(cur + d); }

document.getElementById('sf').innerHTML = mkSheet(pages[0], 1);
upNav();

function drawBg() {
  const canvas = document.getElementById('bg');
  const root = document.getElementById('root');
  const W = root.offsetWidth || window.innerWidth;
  const H = root.offsetHeight || window.innerHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d0a07';
  ctx.fillRect(0, 0, W, H);

  const rows = 24, cols = 32;
  const sw = W / cols, sh = (H * 0.55) / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * sw, y = H * 0.26 + r * sh;
      const dist = Math.hypot(c - cols / 2, r - rows * 0.08) / (cols * 0.58);
      const dark = Math.min(1, dist * dist * 1.3);
      const base = Math.floor(22 + dark * 16);
      ctx.fillStyle = `rgb(${base},${Math.floor(base*0.82)},${Math.floor(base*0.58)})`;
      ctx.fillRect(x + 1, y + 1, sw - 2, sh * 0.7);
      const bk = Math.floor(7 + dark * 9);
      ctx.fillStyle = `rgb(${bk},${bk},${bk})`;
      ctx.fillRect(x + 1, y + sh * 0.7, sw - 2, sh * 0.3);
    }
  }

  ctx.fillStyle = '#281a0a';
  ctx.fillRect(0, H * 0.78, W, H * 0.22);
  for (let i = 0; i < 8; i++) {
    const y = H * 0.78 + i * (H * 0.22 / 8);
    ctx.strokeStyle = 'rgba(0,0,0,0.28)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,200,100,0.035)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0, y + 1); ctx.lineTo(W, y + 1); ctx.stroke();
  }

  const cl = ctx.createLinearGradient(0, 0, W * 0.14, 0);
  cl.addColorStop(0, 'rgba(8,4,1,0.97)');
  cl.addColorStop(1, 'rgba(8,4,1,0)');
  ctx.fillStyle = cl; ctx.fillRect(0, 0, W * 0.14, H);

  const cr2 = ctx.createLinearGradient(W, 0, W * 0.86, 0);
  cr2.addColorStop(0, 'rgba(8,4,1,0.97)');
  cr2.addColorStop(1, 'rgba(8,4,1,0)');
  ctx.fillStyle = cr2; ctx.fillRect(W * 0.86, 0, W * 0.14, H);

  const spot = ctx.createRadialGradient(W/2, 0, 0, W/2, H * 0.28, W * 0.42);
  spot.addColorStop(0, 'rgba(255,205,105,0.17)');
  spot.addColorStop(0.45, 'rgba(255,180,60,0.07)');
  spot.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = spot; ctx.fillRect(0, 0, W, H);

  [[0.28, 0.13], [0.5, 0.11], [0.72, 0.13]].forEach(([lx, ly]) => {
    const g = ctx.createRadialGradient(W*lx, H*0.01, 0, W*lx, H*ly, W*0.14);
    g.addColorStop(0, 'rgba(255,240,180,0.88)');
    g.addColorStop(0.25, 'rgba(255,200,80,0.55)');
    g.addColorStop(1, 'rgba(255,160,40,0)');
    ctx.fillStyle = g; ctx.fillRect(W*lx - W*0.14, 0, W*0.28, H*0.3);
  });

  const topBar = ctx.createLinearGradient(0, 0, 0, H * 0.06);
  topBar.addColorStop(0, 'rgba(6,4,2,0.98)');
  topBar.addColorStop(1, 'rgba(6,4,2,0)');
  ctx.fillStyle = topBar; ctx.fillRect(0, 0, W, H * 0.06);
}

drawBg();
window.addEventListener('resize', drawBg);
</script>
</body>
</html>
