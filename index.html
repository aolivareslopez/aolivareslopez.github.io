<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>aolivareslopez - Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; background: #0d0a07; font-family: 'EB Garamond', Georgia, serif; overflow-x: hidden; }
  #root { width: 100%; min-height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 1.5rem 0 0; }
  canvas#bg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .ui {
    position: relative; z-index: 3;
    display: flex; flex-direction: column; align-items: center;
    padding: 0.5rem 1rem 0; width: 100%;
  }

  .tabs {
    display: flex; gap: 5px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 0.7rem;
  }
  .tb {
    font-family: 'EB Garamond', serif; font-size: 12px;
    letter-spacing: 0.07em; color: #b89050;
    background: rgba(30,20,8,0.72);
    border: 0.5px solid rgba(184,144,80,0.35);
    border-radius: 1px; padding: 4px 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .tb:hover, .tb.on { background: rgba(184,144,80,0.18); color: #f0d8a0; border-color: rgba(184,144,80,0.65); }

  .stand-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }

  .spread {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 2;
  }

  .sheet {
    width: 300px;
    min-height: 400px;
    background: #ffffff;
    padding: 1.2rem 1.3rem 1.5rem;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.9), 0 2px 6px rgba(0,0,0,0.6);
    display: none;
  }
  .sheet.on { display: block; }

  .sheet.left  { border-radius: 2px 0 0 2px; transform-origin: right center; }
  .sheet.right { border-radius: 0 2px 2px 0; transform-origin: left center; }

  /* Cover: only right page shown, left hidden */
  .spread.cover-mode .sheet.left { display: none !important; }
  .spread.cover-mode .sheet.right.on {
    display: block;
    border-radius: 2px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.95), 0 2px 8px rgba(0,0,0,0.7);
  }

  /* Cover page inner styling */
  .cover-inner {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; min-height: 370px;
    text-align: center; gap: 0;
    padding: 2rem 1.5rem;
  }
  .cover-ornament {
    font-size: 22px; color: #c8a050; letter-spacing: 0.2em;
    margin-bottom: 1.2rem; opacity: 0.7;
  }
  .cover-name {
    font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600;
    color: #1a1005; letter-spacing: 0.06em; line-height: 1.2;
    margin-bottom: 0.4rem;
  }
  .cover-subtitle {
    font-family: 'EB Garamond', serif; font-style: italic;
    font-size: 11.5px; color: #7a5820; letter-spacing: 0.04em;
    margin-bottom: 1.6rem;
  }
  .cover-rule {
    width: 60px; height: 1px; background: rgba(90,60,20,0.3);
    margin: 0 auto 1.6rem;
  }
  .cover-meta {
    font-family: 'EB Garamond', serif; font-size: 10px;
    color: #8c6230; letter-spacing: 0.1em; text-transform: uppercase;
    line-height: 2;
  }
  .cover-year {
    font-family: 'Playfair Display', serif; font-size: 11px;
    color: #b89050; letter-spacing: 0.14em;
    margin-top: 1.4rem;
  }
  .sheet.left::after {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 10px; height: 100%;
    background: linear-gradient(to right, transparent, rgba(0,0,0,0.18));
    pointer-events: none;
  }
  .sheet.right::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 10px; height: 100%;
    background: linear-gradient(to left, transparent, rgba(0,0,0,0.12));
    pointer-events: none;
    z-index: 1;
  }

  .sheet::after, .sheet.right::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(transparent, transparent 22px, rgba(80,55,20,0.11) 22px, rgba(80,55,20,0.11) 23px);
    background-position: 0 44px;
  }
  .sheet.left::after {
    background: repeating-linear-gradient(transparent, transparent 22px, rgba(80,55,20,0.11) 22px, rgba(80,55,20,0.11) 23px),
                linear-gradient(to right, transparent, rgba(0,0,0,0.18));
    background-position: 0 44px, 0 0;
  }

  /* Cover page: no ruled lines */
  .sheet.cover-sheet::after { background: none; }

  .sheet.right .dogear {
    position: absolute; top: 0; right: 0;
    width: 18px; height: 18px;
    background: linear-gradient(225deg, #c8a050 50%, #f8f2e2 50%);
    border-radius: 0 2px 0 0;
  }

  .pn { position: absolute; bottom: 8px; right: 10px; font-size: 9px; color: #8c6230; letter-spacing: 0.05em; font-family: 'EB Garamond', serif; }
  .tempo { font-style: italic; font-size: 9.5px; color: #7a5820; margin-bottom: 2px; letter-spacing: 0.02em; }
  .stitle { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 600; color: #1a1005; text-align: center; border-bottom: 1px solid rgba(90,60,20,0.18); padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 0.04em; }
  .lbl { font-family: 'Playfair Display', serif; font-size: 8px; font-weight: 600; color: #8c6230; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; margin-top: 7px; }
  .lbl:first-child { margin-top: 0; }
  .txt { font-size: 11px; color: #231608; line-height: 1.5; }
  .txt em { color: #5c3a10; }
  .div { height: 1px; background: rgba(90,60,20,0.13); margin: 5px 0; }
  .tags { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; }
  .tag { font-size: 9px; color: #5c3a10; border: 0.5px solid #c8a050; border-radius: 1px; padding: 1px 5px; background: rgba(200,160,80,0.09); }
  .pt { font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 600; color: #1a1005; }
  .pd { font-size: 10.5px; color: #3a2510; line-height: 1.4; }
  .cr { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #1a1005; margin-bottom: 4px; }
  .ci { font-size: 12px; color: #8c6230; width: 13px; text-align: center; }

  .spread.fout-left  .sheet.left  { animation: foutL 0.2s ease-in forwards; }
  .spread.fout-right .sheet.right { animation: foutR 0.2s ease-in forwards; }
  .spread.fin-left   .sheet.left  { animation: finL  0.22s ease-out forwards; }
  .spread.fin-right  .sheet.right { animation: finR  0.22s ease-out forwards; }

  @keyframes foutL { from { transform: rotateY(0); opacity:1; } to { transform: perspective(900px) rotateY(25deg) scale(0.97); opacity:0; } }
  @keyframes foutR { from { transform: rotateY(0); opacity:1; } to { transform: perspective(900px) rotateY(-25deg) scale(0.97); opacity:0; } }
  @keyframes finL  { from { transform: perspective(900px) rotateY(-25deg) scale(0.97); opacity:0; } to { transform: rotateY(0); opacity:1; } }
  @keyframes finR  { from { transform: perspective(900px) rotateY(25deg) scale(0.97); opacity:0; } to { transform: rotateY(0); opacity:1; } }

  .nav {
    display: flex; align-items: center; justify-content: space-between;
    width: 460px; margin-top: 6px; position: relative; z-index: 4;
  }
  .nb {
    font-family: 'EB Garamond', serif; font-size: 12px; color: #b89050;
    background: rgba(20,14,4,0.65);
    border: 0.5px solid rgba(184,144,80,0.32);
    border-radius: 1px; padding: 4px 16px;
    cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s;
  }
  .nb:hover { background: rgba(184,144,80,0.18); color: #f0d8a0; }
  .nb:disabled { opacity: 0.22; cursor: default; }
  .pi { font-family: 'EB Garamond', serif; font-size: 11px; color: #8c6230; letter-spacing: 0.08em; }

  svg.stand-svg { overflow: visible; display: block; margin-top: -4px; }

  @media (max-width: 520px) {
    .sheet { width: 300px; min-height: 340px; }
    .nav { width: 340px; }
    svg.stand-svg { width: 340px; height: auto; }
  }
</style>
</head>

const spreads = [

  {

    leftHtml: `

      <div class="div"></div>

];

let cur = 0, busy = false;

const COVER_HTML = `
  <div class="cover-inner">
    <div class="cover-ornament">𝄞 &nbsp; ♩ &nbsp; 𝄞</div>
    <div class="cover-name">Alejandro<br>Olivares-Lopez</div>
    <div class="cover-subtitle">Software Engineer</div>
    <div class="cover-meta">
      Computer Science · UC Irvine<br>
      Irvine, CA
    </div>
  </div>
`;

function isCover() { return spreads[cur].isCover; }

function applySpreadMode() {
  const spread = document.getElementById('spread');
  const sl = document.getElementById('sl');
  const sr = document.getElementById('sr');
  if (isCover()) {
    spread.classList.add('cover-mode');
    sl.classList.remove('on');
    sr.classList.add('on');
    sr.classList.add('cover-sheet');
    sr.innerHTML = COVER_HTML;
  } else {
    spread.classList.remove('cover-mode');
    sl.classList.add('on');
    sr.classList.remove('cover-sheet');
  }
}

function mkLeft(s, idx) {
  return `<div class="tempo">${s.leftTempo}</div>
    <div class="stitle">${s.leftTitle}</div>
    ${s.leftHtml}
    <div class="pn">${idx * 2 - 1}</div>`;
}
function mkRight(s, idx) {
  return `<div class="dogear"></div>
    <div class="tempo">${s.rightTempo}</div>
    <div class="stitle">${s.rightTitle}</div>
    ${s.rightHtml}
    <div class="pn">${idx * 2}</div>`;
}

function mkTabs() {
  document.getElementById('tabs').innerHTML = spreads.map((s, i) =>
    `<button class="tb${i === cur ? ' on' : ''}" onclick="goTo(${i})">${s.label}</button>`
  ).join('');
}

function upNav() {
  document.getElementById('pb').disabled = cur === 0;
  document.getElementById('nb2').disabled = cur === spreads.length - 1;
  // Cover has no page numbers
  document.getElementById('pi').textContent = isCover()
    ? 'Portfolio'
    : `Pages ${cur * 2 - 1}–${cur * 2} of ${(spreads.length - 1) * 2}`;
  mkTabs();
}

function render() {
  const sl = document.getElementById('sl');
  const sr = document.getElementById('sr');
  applySpreadMode();
  if (!isCover()) {
    const s = spreads[cur];
    const idx = cur; // 1-indexed inner pages
    sl.innerHTML = mkLeft(s, idx);
    sr.innerHTML = mkRight(s, idx);
  }
}

function goTo(idx) {
  if (busy || idx === cur || idx < 0 || idx >= spreads.length) return;
  busy = true;
  const spread = document.getElementById('spread');
  const dir = idx > cur ? 'fout-right' : 'fout-left';
  spread.classList.add(dir);
  setTimeout(() => {
    spread.classList.remove(dir);
    cur = idx;
    render(); upNav();
    spread.classList.add('fin-left'); spread.classList.add('fin-right');
    setTimeout(() => {
      spread.classList.remove('fin-left'); spread.classList.remove('fin-right');
      busy = false;
    }, 240);
  }, 200);
}

function go(d) { goTo(cur + d); }

render(); upNav();

function drawBg() {
  const canvas = document.getElementById('bg');
  const root = document.getElementById('root');
  const W = root.offsetWidth || window.innerWidth;
  const H = root.offsetHeight || window.innerHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d0a07'; ctx.fillRect(0, 0, W, H);

  const rows = 14, cols = 24;
  const sw = W / cols, sh = (H * 0.38) / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * sw, y = H * 0.44 + r * sh;
      const dist = Math.hypot(c - cols/2, r - rows*0.08) / (cols*0.58);
      const dark = Math.min(1, dist*dist*1.3);
      const base = Math.floor(20 + dark*14);
      ctx.fillStyle = `rgb(${base},${Math.floor(base*0.82)},${Math.floor(base*0.58)})`;
      ctx.fillRect(x+1, y+1, sw-2, sh*0.7);
      const bk = Math.floor(6 + dark*8);
      ctx.fillStyle = `rgb(${bk},${bk},${bk})`;
      ctx.fillRect(x+1, y+sh*0.7, sw-2, sh*0.3);
    }
  }

  ctx.fillStyle = '#1e1408'; ctx.fillRect(0, H*0.86, W, H*0.14);
  for (let i = 0; i < 5; i++) {
    const y = H*0.86 + i*(H*0.14/5);
    ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    ctx.strokeStyle='rgba(255,200,100,0.03)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(0,y+1); ctx.lineTo(W,y+1); ctx.stroke();
  }

  const cl = ctx.createLinearGradient(0,0,W*0.09,0);
  cl.addColorStop(0,'rgba(8,4,1,0.97)'); cl.addColorStop(1,'rgba(8,4,1,0)');
  ctx.fillStyle=cl; ctx.fillRect(0,0,W*0.09,H);
  const cr2 = ctx.createLinearGradient(W,0,W*0.91,0);
  cr2.addColorStop(0,'rgba(8,4,1,0.97)'); cr2.addColorStop(1,'rgba(8,4,1,0)');
  ctx.fillStyle=cr2; ctx.fillRect(W*0.91,0,W*0.09,H);

  const spot = ctx.createRadialGradient(W/2,0,0,W/2,H*0.22,W*0.35);
  spot.addColorStop(0,'rgba(255,205,105,0.13)');
  spot.addColorStop(0.45,'rgba(255,180,60,0.05)');
  spot.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=spot; ctx.fillRect(0,0,W,H);

  [[0.28,0.10],[0.5,0.08],[0.72,0.10]].forEach(([lx,ly])=>{
    const g=ctx.createRadialGradient(W*lx,H*0.01,0,W*lx,H*ly,W*0.11);
    g.addColorStop(0,'rgba(255,240,180,0.72)');
    g.addColorStop(0.25,'rgba(255,200,80,0.4)');
    g.addColorStop(1,'rgba(255,160,40,0)');
    ctx.fillStyle=g; ctx.fillRect(W*lx-W*0.11,0,W*0.22,H*0.22);
  });

  const topBar = ctx.createLinearGradient(0,0,0,H*0.06);
  topBar.addColorStop(0,'rgba(6,4,2,0.98)'); topBar.addColorStop(1,'rgba(6,4,2,0)');
  ctx.fillStyle=topBar; ctx.fillRect(0,0,W,H*0.06);
}

drawBg(); window.addEventListener('resize', drawBg);
</script>
